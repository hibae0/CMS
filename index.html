<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KANRI COMMISSION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- Admin password modal -->
  <div id="adminModal" class="modal hidden">
    <div class="modal-box">
      <h3>管理員登入</h3>
      <input type="password" id="adminPasswordInput" placeholder="輸入密碼" />
      <div class="modal-actions">
        <button onclick="checkAdminPassword()">確認</button>
        <button class="secondary" onclick="closeModal('adminModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div id="profileModal" class="modal hidden">
    <div class="modal-box large">
      <h3>編輯個人資訊</h3>
      <label>頭像網址</label>
      <input type="text" id="editAvatar" placeholder="https://..." />
      <label>名稱</label>
      <input type="text" id="editName" />
      <label>副標</label>
      <input type="text" id="editSubtitle" />
      <div class="modal-actions">
        <button onclick="saveProfile()">儲存</button>
        <button class="secondary" onclick="closeModal('profileModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- Edit Notice Modal -->
  <div id="noticeModal" class="modal hidden">
    <div class="modal-box large">
      <h3>編輯公告</h3>
      <div id="noticeEditList"></div>
      <button class="add-btn" onclick="addNoticeItem()">＋ 新增公告</button>
      <div class="modal-actions">
        <button onclick="saveNotices()">儲存</button>
        <button class="secondary" onclick="closeModal('noticeModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Product Modal -->
  <div id="productModal" class="modal hidden">
    <div class="modal-box large">
      <h3 id="productModalTitle">新增商品</h3>
      <label>商品名稱</label>
      <input type="text" id="editProductName" placeholder="例：插畫委託" />
      <label>標籤（逗號分隔）</label>
      <input type="text" id="editProductTags" placeholder="例：插畫, 委託" />
      <label>描述</label>
      <textarea id="editProductDesc" placeholder="商品說明..."></textarea>
      <label>圖片網址</label>
      <input type="text" id="editProductImg" placeholder="https://..." />
      <label>庫存數量（留空 = 不限）</label>
      <input type="number" id="editProductStock" placeholder="例：5，留空表示不限量" min="0" />
      <label>金額（TWD）</label>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:4px">
        <label style="margin:0;display:flex;align-items:center;gap:6px;font-size:.85rem">
          <input type="radio" name="priceType" value="fixed" id="priceFixed" checked onchange="togglePriceType(this.value)"> 固定金額
        </label>
        <label style="margin:0;display:flex;align-items:center;gap:6px;font-size:.85rem">
          <input type="radio" name="priceType" value="negotiate" id="priceNegotiate" onchange="togglePriceType(this.value)"> 洽談
        </label>
        <label style="margin:0;display:flex;align-items:center;gap:6px;font-size:.85rem">
          <input type="radio" name="priceType" value="custom" id="priceCustom" onchange="togglePriceType(this.value)"> 顧客自填
        </label>
      </div>
      <input type="number" id="editProductPrice" placeholder="0" />
      <label>狀態</label>
      <select id="editProductStatus">
        <option value="available">開放中</option>
        <option value="waitlist">預約候補</option>
        <option value="closed">暫停接單</option>
      </select>
      <div class="modal-actions">
        <button onclick="saveProduct()">儲存商品</button>
        <button class="secondary" onclick="closeModal('productModal')">取消</button>
      </div>
    </div>
  </div>

  <!-- Cart Modal -->
  <div id="cartModal" class="modal hidden">
    <div class="modal-box large">
      <h3>購物車</h3>
      <div id="cartItems"></div>
      <div id="customPriceInputs"></div>
      <div id="cartTotal" class="cart-total"></div>
      <label style="margin-top:16px;display:block">您的姓名</label>
      <input type="text" id="buyerName" placeholder="請輸入姓名" />
      <label>Email</label>
      <input type="email" id="buyerEmail" placeholder="請輸入 Email" />
      <label>備註 / 委託說明</label>
      <textarea id="buyerNote" placeholder="請填寫委託細節..."></textarea>
      <div class="modal-actions">
        <button onclick="checkout()">前往付款</button>
        <button class="secondary" onclick="closeModal('cartModal')">繼續瀏覽</button>
      </div>
    </div>
  </div>

  <!-- Payment form (hidden, auto-submit) -->
  <form id="paymentForm" method="POST" action="https://ccore.newebpay.com/MPG/mpg_gateway" style="display:none">
    <input type="hidden" name="MerchantID" id="fMerchantID" />
    <input type="hidden" name="TradeInfo" id="fTradeInfo" />
    <input type="hidden" name="TradeSha" id="fTradeSha" />
    <input type="hidden" name="Version" value="2.0" />
  </form>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <span class="site-title">KANRI COMMISSION</span>
      <nav class="header-nav">
        <a class="nav-link" href="https://app.notion.com/p/KANRI-COMMISSION-23c80424f5908028a9b6de1c81524a1a" target="_blank" rel="noopener">作品 &amp; 服務</a>
        <button class="cart-btn" onclick="openCart()">
          <span class="cart-icon">🛒</span>
          <span class="cart-count" id="cartCount">0</span>
        </button>
        <button class="admin-btn" id="adminToggleBtn" onclick="toggleAdmin()">管理</button>
      </nav>
    </div>
  </header>

  <div class="layout">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="profile-card">
        <div class="avatar-wrap">
          <img id="avatarImg" src="https://i.imgur.com/placeholder.png" alt="Avatar" onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'120\' height=\'120\'><rect width=\'120\' height=\'120\' fill=\'%23e8e0f0\'/><text x=\'50%25\' y=\'55%25\' text-anchor=\'middle\' fill=\'%23888\' font-size=\'40\'>K</text></svg>'"/>
        </div>
        <h2 class="profile-name" id="profileName">KANRI</h2>
        <p class="profile-subtitle" id="profileSubtitle">插畫委託</p>
        <button class="edit-btn admin-only hidden" onclick="openModal('profileModal'); loadProfileForm()">✏ 編輯資訊</button>
      </div>

      <section class="sidebar-notice" id="notice">
        <div class="notice-header">
          <h3 class="section-label">NOTICE</h3>
          <button class="edit-btn admin-only hidden" onclick="openNoticeModal()">✏ 編輯</button>
        </div>
        <div id="noticeList" class="notice-list"></div>
      </section>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="products">
      <div class="products-header">
        <h2 class="section-title">Price &amp; Service</h2>
        <button class="add-product-btn admin-only hidden" onclick="openAddProduct()">＋ 新增商品</button>
      </div>
      <div id="productGrid" class="product-grid"></div>
    </main>
  </div>

  <footer class="site-footer">
    <p>© 2026 KANRI COMMISSION · 如有任何問題請來信洽詢</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
